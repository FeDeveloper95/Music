<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfect as a Star - Media Player</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="player-container">
    <!-- Copertina della traccia -->
    <div class="cover-container">
      <img src="cover.jpg" alt="Copertina Perfect as a Star" class="cover-image">
    </div>

    <!-- Informazioni sulla traccia -->
    <div class="track-info">
      <h1>Perfect as a Star</h1>
      <p> <strong>Bush</strong></p>
    </div>

    <!-- Media Player -->
    <div class="controls">
      <audio id="audio-player" autoplay controls>
        <source src="Perfect_as_a_Star.mp3" type="audio/mpeg">
        Il tuo browser non supporta l'elemento audio.
      </audio>
    </div>

    <!-- Cuore al posto del pulsante download -->
    <div class="heart-icon">
      🩵
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
